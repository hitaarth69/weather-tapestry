<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌤️ Global Weather Tapestry Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Background Canvas for Particles -->
    <canvas id="weather-canvas"></canvas>

    <div class="app" id="app">
        <!-- Header -->
        <header>
            <h1>🌤️ Weather Tapestry</h1>
            <p>Live forecast • Dynamic visuals • Global coverage</p>
        </header>

        <!-- Controls (Unit Toggle + Location) -->
        <div class="controls">
            <button id="unit-toggle" class="btn-toggle">°C / °F</button>
            <button id="location-btn" class="btn-location">📍 Use My Location</button>
        </div>

        <!-- Search Section -->
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter a city..." autofocus />
                <button id="search-btn">🔍 Search</button>
            </div>
            <div class="search-status" id="search-status"></div>
            <!-- Search History Chips -->
            <div class="history-chips" id="history-chips"></div>
        </div>

        <!-- Current Weather -->
        <section class="current-weather" id="current-weather">
            <div class="current-left">
                <h2 id="city-name">—</h2>
                <div class="current-temp" id="current-temp">—</div>
                <div class="current-feelslike" id="current-feelslike">🌡️ Feels like —</div>
                <div class="current-condition" id="current-condition">—</div>
                <div class="current-details">
                    <span id="current-humidity">💧 —</span>
                    <span id="current-wind">🌬️ —</span>
                    <span id="current-uv">☀️ UV —</span>
                </div>
                <!-- Sunrise / Sunset -->
                <div class="sun-schedule" id="sun-schedule">
                    <span id="sunrise-display">🌅 —</span>
                    <span id="sunset-display">🌇 —</span>
                </div>
            </div>
            <div class="current-right">
                <div class="weather-icon-large" id="current-icon">🌤️</div>
            </div>
        </section>

        <!-- Hourly Forecast -->
        <section class="hourly-forecast">
            <h2>⏰ Hourly Forecast</h2>
            <div class="hourly-scroll" id="hourly-scroll">
                <!-- Injected by JS -->
            </div>
        </section>

        <!-- 5‑Day Forecast -->
        <section class="forecast">
            <h2>📅 5‑Day Forecast</h2>
            <div class="forecast-grid" id="forecast-grid">
                <!-- Injected by JS -->
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>🌐 Powered by <a href="https://open-meteo.com/" target="_blank">Open‑Meteo</a> • Data updates in real time</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
